version: '3.8'

services:
  # Database Service
  db:
    image: postgres:15-alpine
    container_name: pdfmaster-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword123
      POSTGRES_DB: pdfmaster_pro
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - pdfmaster-network
    restart: always

  # Backend REST API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pdfmaster-backend
    environment:
      PORT: 5000
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgrespassword123@db:5432/pdfmaster_pro
      JWT_SECRET: pdfmaster-pro-secret-key-123456
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    ports:
      - "5000:5000"
    depends_on:
      - db
    networks:
      - pdfmaster-network
    restart: always

  # Frontend Next.js Web Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pdfmaster-frontend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:5000
    depends_on:
      - backend
    networks:
      - pdfmaster-network
    restart: always

networks:
  pdfmaster-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
