name: PDFMaster Pro CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # Backend Lint & Build Check
  backend-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'
      - name: Install dependencies
        run: |
          cd backend
          npm ci
      - name: Compile TypeScript
        run: |
          cd backend
          npm run build

  # Frontend Lint & Build Check
  frontend-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
      - name: Compile Next.js
        run: |
          cd frontend
          npm run build

  # Electron Desktop Builder Check
  desktop-validation:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: 'desktop/package-lock.json'
      - name: Install dependencies
        run: |
          cd desktop
          npm ci
      - name: Build Electron Win target
        run: |
          cd desktop
          # Check packaging syntax validity
          npm run build --no-publish
